<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Player - zonatrialapp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Menú</h2>
      </div>
      
      <div class="sidebar-section">
        <h3>Mi Música</h3>
        <ul id="lista-archivos" class="file-list">
          <li class="empty-list">No hay archivos subidos</li>
        </ul>
      </div>

      <div class="sidebar-section">
        <h3>Skins Disponibles</h3>
        <div class="skin-selector">
          <button onclick="cambiarSkin('retro')" class="btn-skin btn-retro">Retro Verde</button>
          <button onclick="cambiarSkin('neon')" class="btn-skin btn-neon">Cyberpunk</button>
        </div>
      </div>
    </div>

    <div class="main-player">
      <header class="player-header">
        <h1 class="logo-title">RETRO PLAYER</h1>
        <p class="subtitle">Tu música local</p>
      </header>

      <div class="disc-container">
        <div class="audio-disc">
          <div class="disc-center"></div>
        </div>
      </div>

      <div class="track-info">
        <h3 id="track-name">Ningún archivo cargado</h3>
        <p id="track-artist">Archivo Local</p>
      </div>

      <div class="progress-container">
        <span class="time-current">0:00</span>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <span class="time-total">0:41</span>
      </div>

      <div class="player-controls">
        <button class="control-btn btn-prev">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        
        <button onclick="togglePlay()" class="control-btn btn-play-pause" id="play-trigger">
          <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        
        <button class="control-btn btn-next">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg>
        </button>
      </div>

      <div class="upload-area">
        <button class="btn-upload">Cargar archivos .mp3</button>
      </div>

      <footer class="app-footer">
        <p>© 2026 zonatrialapp by DanielReal | Todos los derechos reservados</p>
      </footer>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
